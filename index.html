<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket attivo</title>

<script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(180deg,#7cc76d,#4fad63);
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:400px;
  min-height:100vh;
  padding-bottom:140px;
}
.header{
  color:#fff;
  padding:22px 16px 10px;
  text-align:center;
  font-weight:600;
  font-size:1.1em;
  position:relative;
}
.header a{
  position:absolute;
  left:16px;
  top:20px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-decoration:none;
}
.ticket{
  background:#fff;
  margin:18px;
  padding:20px;
  border-radius:24px;
  box-shadow:0 8px 25px rgba(0,0,0,.15);
}
.logo{
  font-weight:700;
  font-size:14px;
  margin-bottom:8px;
}
h1{
  margin:0;
  font-size:1.05em;
  color:#1f5fbf;
  font-weight:700;
}
.subtitle{
  font-size:.9em;
  font-weight:600;
  color:#333;
  margin-top:2px;
}
.desc{
  font-size:.85em;
  color:#6f7f8f;
  margin-top:6px;
}
.validation-box{
  margin-top:15px;
  background:#f7f8f9;
  border-radius:18px;
  padding:14px;
  border:1px solid #d9d9d9;
}
.validation-header{
  font-weight:600;
  font-size:.9em;
  margin-bottom:10px;
  color:#4a4a4a;
}
#qrcode{
  display:flex;
  justify-content:center;
}
.qr-caption{
  text-align:center;
  color:#1f5fbf;
  font-size:.85em;
  margin-top:6px;
}
.time{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
  font-weight:600;
  color:#1f5fbf;
}

/* BARRETTINA */
.bar-mini{
  width:60px;
  height:6px;
  background:#ddd;
  border-radius:4px;
  overflow:hidden;
}
.bar-mini span{
  display:block;
  height:100%;
  background:#6ea8ff;
  width:100%;
  transition:width 0.5s linear;
}

.green-block{
  margin-top:16px;
  padding:14px;
  border-radius:16px;
  background:linear-gradient(90deg,#6dc16a,#4aa957);
  color:#fff;
  font-size:.9em;
  font-weight:600;
}
.section{
  margin-top:16px;
  font-size:.9em;
}
.row{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}
.label{color:#888;}
.price{
  font-size:1.3em;
  font-weight:700;
}
.footer{
  padding:16px;
  background:#fff;
  border-radius:22px 22px 0 0;
  position:fixed;
  bottom:0;
  width:100%;
  max-width:400px;
}
.footer button{
  width:100%;
  padding:14px;
  font-size:1em;
  font-weight:600;
  border:none;
  background:linear-gradient(90deg,#4c8bf5,#1f5fbf);
  color:#fff;
  border-radius:14px;
}
.scanner{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:9999;
}
.scanner.show{display:flex}
.scanner-top{
  color:#fff;
  padding:16px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
}
#reader{flex:1}
</style>
</head>

<body>
<div class="app">

<div class="header">
  <a href="#">&lt;</a>
  Ticket attivo
</div>

<div class="ticket">

<div class="logo">ATAP</div>

<h1>EXTRAURBANO CORSA SEMPLICE</h1>
<div class="subtitle">CLASSE 5</div>
<div class="desc">Titolo di viaggio valido su linee extraurbane</div>

<div class="validation-box">
<div class="validation-header">Controllo e validazione</div>

<div id="qrcode"></div>

<div class="qr-caption">Ingrandisci QRCode</div>

<div class="time">
<span id="clock">--:--:--</span>
<div style="display:flex;align-items:center;gap:10px;">
<div class="bar-mini"><span id="barFill"></span></div>
</div>
</div>

</div>

<div class="green-block">
Attivato il: <span id="activated"></span><br>
Mezzo / Località: 384
</div>

<div class="section">
<div class="row">
<div>
<div class="label">Emesso il</div>
<div id="emission"></div>
</div>
</div>

<div class="row">
<div>Costo</div>
<div class="price">3,40 €</div>
</div>
</div>

</div>

<div class="footer">
<button onclick="openScanner()">Cambia mezzo</button>
</div>

<div class="scanner" id="scanner">
<div class="scanner-top">
<span>Scansiona QR</span>
<button onclick="closeScanner()">Chiudi</button>
</div>
<div id="reader"></div>
</div>

</div>

<script>
function pad(n){return String(n).padStart(2,'0')}
let duration=90*60*1000;
let startTime=Date.now();
let scanner;

function updateTime(){
const now=Date.now();
const remaining=duration-(now-startTime);
const d=new Date();
const t=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const da=`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;

document.getElementById("clock").textContent=t;
document.getElementById("activated").textContent=`${da} - ${t.slice(0,5)}`;
document.getElementById("emission").textContent=`${da} - ${t.slice(0,5)}`;
document.getElementById("barFill").style.width=(remaining/duration*100)+"%";
}
setInterval(updateTime,1000);
updateTime();

new QRCode(document.getElementById("qrcode"),{
text:`ATAP|7110|${Date.now()}`,
width:210,
height:210
});

function openScanner(){
document.getElementById("scanner").classList.add("show");
scanner=new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (decodedText) => {
    console.log("QR letto:", decodedText);
    closeScanner();
    startTime = Date.now();
  }
).catch(err=>{
  console.error(err);
  alert("Camera non disponibile o permessi negati");
});
}

function closeScanner(){
if(scanner){
  scanner.stop().then(()=>scanner.clear()).catch(()=>{});
}
document.getElementById("scanner").classList.remove("show");
}
</script>

</body>
</html>
